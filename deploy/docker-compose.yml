version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aichat-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=aichat
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: aichat-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=aichat
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: aichat-redis
    command: ["redis-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    build: 
      context: ..
      dockerfile: deploy/backend.dockerfile  
    container_name: aichat-backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    volumes: 
      - ../config/config.docker.toml:/app/config/config.toml:ro
    
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.dockerfile
    container_name: aichat-frontend
    ports:
      - "3000:80"
