services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: aichat-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=aichat
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: aichat-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=aichat
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:7-alpine
    container_name: aichat-redis
    command: ["redis-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    build: 
      context: ..
      dockerfile: deploy/backend.dockerfile  
    container_name: aichat-backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    volumes: 
      - ../config/config.docker.toml:/app/config/config.toml:ro
    
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.dockerfile
    container_name: aichat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend          # 保证 backend 先启动，避免 nginx 起时 backend DNS 未就绪
    restart: unless-stopped  # 双保险：若仍因时序启动失败，自动重启直到就绪

volumes:
  mysql_data:
  redis_data:
