server {
    listen 80;
    server_name localhost;

    # Vue 静态文件（SPA 回退）
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        # 写法一（你现在的）：rewrite 改路径 + proxy_pass 不带 URI
        rewrite ^/api/(.*)$ /ai-chat/$1 break;
        proxy_pass http://backend:8080;

        # —— SSE 关键三行 ——
        proxy_http_version 1.1;          # 必须用 1.1 才支持 chunked 流式
        proxy_set_header Connection "";  # 清掉 Connection: close，保持长连
        proxy_buffering off;             # 不缓冲响应体，来一块发一块
        proxy_cache off;
        proxy_read_timeout 300s;         # 流式可能很久不出数据，超时调大

        # 透传客户端真实信息（后端拿 IP 用得到）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
